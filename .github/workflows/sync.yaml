name: sync upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
      - name: fetch upstream tags
        run: |
          git remote add w3c https://github.com/w3c/epubcheck.git
          git fetch w3c --tags
      - name: push new tags to origin
        run: git push origin --tags
