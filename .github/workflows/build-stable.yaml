name: build stable version

on:
  push:
    tags: [ v* ]

env:
  IMAGE_NAME: "novalagung/epubcheck"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: construct release tagging
        run: |
          TAG=${{ github.ref_name }}
          echo "TAG_SHORT=${TAG#v}" >> $GITHUB_ENV
          echo "${TAG_SHORT}"
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v4
        with:
          push: true
          tags: "${{ env.IMAGE_NAME }}:${{ env.TAG_SHORT }}"
